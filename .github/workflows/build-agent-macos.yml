name: Build macOS Agent

on:
  push:
    branches: [ci/macos-agent-build]
  workflow_dispatch:
    inputs:
      relay_url:
        description: "Relay URL baked into the binary (main.relayURL)"
        required: false
        default: "wss://peek.maos.dev"

jobs:
  build-amd64:
    # macos-13 is a native Intel (amd64) runner, so the cgo screen-capture
    # binary is built natively — no cross C toolchain needed.
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod

      - name: Build agent (darwin/amd64)
        working-directory: agent
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: "1"
        run: |
          go build -ldflags "-X main.relayURL=${{ inputs.relay_url }} -s -w" -o ../dist/main-amd64 .
          file ../dist/main-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: peek-agent-darwin-amd64
          path: dist/main-amd64
          if-no-files-found: error
